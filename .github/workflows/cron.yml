name: Cron — Resolver y crear mercados

on:
  schedule:
    # Cada hora en punto (UTC) — GitHub Actions no bloquea las APIs gov españolas
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Mostrar respuestas completas'
        required: false
        default: 'false'

jobs:
  run-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Obtener precio electricidad (REE) ──────────────────────────────
      - name: Fetch precio luz REE
        id: luz
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          RESPONSE=$(curl -s --max-time 15 \
            "https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real?start_date=${TODAY}T00:00&end_date=${TODAY}T23:59&time_trunc=hour&geo_trunc=electric_system&geo_limit=peninsular&geo_ids=8741" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0")
          # Extraer valores numéricos y calcular media
          AVG=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          try:
            data = json.load(sys.stdin)
            datasets = data.get('included', [])
            for ds in datasets:
              vals = ds.get('attributes', {}).get('values', [])
              nums = [v['value'] for v in vals if isinstance(v.get('value'), (int, float)) and v['value'] > 0]
              if len(nums) >= 4:
                avg = sum(nums) / len(nums)
                print(f'{avg:.2f}')
                break
          except Exception as e:
            print('ERROR')
          " 2>/dev/null || echo "ERROR")
          echo "avg_luz=$AVG" >> $GITHUB_OUTPUT
          echo "Precio luz medio: $AVG EUR/MWh"

      # ── 2. Obtener IBEX 35 (Yahoo Finance) ───────────────────────────────
      - name: Fetch IBEX 35 Yahoo Finance
        id: ibex
        run: |
          RESPONSE=$(curl -s --max-time 15 \
            "https://query1.finance.yahoo.com/v8/finance/chart/%5EIBEX?interval=1d&range=1d" \
            -H "User-Agent: Mozilla/5.0")
          IBEX_VERDE=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          try:
            data = json.load(sys.stdin)
            result = data['chart']['result'][0]
            meta = result['meta']
            prev = meta.get('previousClose') or meta.get('chartPreviousClose')
            current = meta.get('regularMarketPrice')
            if prev and current:
              print('true' if current > prev else 'false')
            else:
              print('unknown')
          except:
            print('unknown')
          " 2>/dev/null || echo "unknown")
          echo "ibex_verde=$IBEX_VERDE" >> $GITHUB_OUTPUT
          echo "IBEX en verde: $IBEX_VERDE"

      # ── 3. Llamar resolve-markets con datos pre-fetcheados ────────────────
      - name: Resolver mercados expirados
        run: |
          LUZ="${{ steps.luz.outputs.avg_luz }}"
          IBEX="${{ steps.ibex.outputs.ibex_verde }}"

          # Construir URL con parámetros disponibles
          URL="${{ secrets.SITE_URL }}/api/resolve-markets"
          PARAMS=""
          if [[ "$LUZ" != "ERROR" && "$LUZ" != "" ]]; then
            PARAMS="?luz=${LUZ}"
          fi
          if [[ "$IBEX" == "true" || "$IBEX" == "false" ]]; then
            if [[ "$PARAMS" == "" ]]; then PARAMS="?ibex=${IBEX}"; else PARAMS="${PARAMS}&ibex=${IBEX}"; fi
          fi

          echo "Llamando: $URL$PARAMS"
          RESULT=$(curl -s --max-time 30 "${URL}${PARAMS}")
          echo "$RESULT"

          RESOLVED=$(echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('resolved',0)+d.get('redistributed',0))" 2>/dev/null || echo "0")
          echo "Mercados resueltos/redistribuidos: $RESOLVED"

      # ── 4. Crear mercados trending ────────────────────────────────────────
      - name: Crear mercados trending
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            "${{ secrets.SITE_URL }}/api/create-markets?mode=trending&key=${{ secrets.ADMIN_API_KEY }}")
          echo "create-markets HTTP $STATUS"
