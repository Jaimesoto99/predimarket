name: Cron — Resolver y crear mercados

on:
  schedule:
    # Cada hora en punto (UTC)
    - cron: '0 * * * *'
  # Permite ejecutarlo manualmente desde GitHub Actions
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Resolver mercados expirados + distribuir ganancias
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SITE_URL }}/api/resolve-markets")
          echo "resolve-markets status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: resolve-markets devolvió $STATUS"
            exit 1
          fi

      - name: Crear mercados trending
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SITE_URL }}/api/create-markets?mode=trending&key=${{ secrets.ADMIN_API_KEY }}")
          echo "create-markets status: $STATUS"
