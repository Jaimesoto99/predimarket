name: Cron - Resolver y crear mercados

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Fetch precio luz REE
        id: luz
        continue-on-error: true
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          RESPONSE=$(curl -sf --max-time 15 \
            "https://apidatos.ree.es/es/datos/mercados/precios-mercados-tiempo-real?start_date=${TODAY}T00:00&end_date=${TODAY}T23:59&time_trunc=hour" \
            -H "Accept: application/json" -H "User-Agent: Mozilla/5.0" || echo "{}")
          AVG=$(echo "$RESPONSE" | grep -o '"value":[0-9.]*' | grep -o '[0-9.]*' | awk '
            BEGIN { sum=0; n=0 }
            { v=$1+0; if(v>5 && v<500) { sum+=v; n++ } }
            END { if(n>3) printf "%.2f", sum/n; else print "ERROR" }
          ')
          echo "avg_luz=$AVG" >> "$GITHUB_OUTPUT"
          echo "Precio luz: $AVG EUR/MWh"

      - name: Fetch IBEX 35
        id: ibex
        continue-on-error: true
        run: |
          RESPONSE=$(curl -sf --max-time 15 \
            "https://query1.finance.yahoo.com/v8/finance/chart/%5EIBEX?interval=1d&range=1d" \
            -H "User-Agent: Mozilla/5.0" || echo "{}")
          PREV=$(echo "$RESPONSE" | grep -o '"previousClose":[0-9.]*' | grep -o '[0-9.]*' | head -1)
          CURR=$(echo "$RESPONSE" | grep -o '"regularMarketPrice":[0-9.]*' | grep -o '[0-9.]*' | head -1)
          if [ -n "$PREV" ] && [ -n "$CURR" ]; then
            VERDE=$(awk "BEGIN { print ($CURR > $PREV) ? \"true\" : \"false\" }")
          else
            VERDE="unknown"
          fi
          echo "ibex_verde=$VERDE" >> "$GITHUB_OUTPUT"
          echo "IBEX verde: $VERDE (prev=$PREV curr=$CURR)"

      - name: Resolver mercados expirados
        continue-on-error: true
        run: |
          BASE="${{ secrets.SITE_URL }}/api/resolve-markets"
          LUZ="${{ steps.luz.outputs.avg_luz }}"
          IBEX="${{ steps.ibex.outputs.ibex_verde }}"
          PARAMS=""
          if [ "$LUZ" != "ERROR" ] && [ -n "$LUZ" ]; then
            PARAMS="${PARAMS}?luz=${LUZ}"
          fi
          if [ "$IBEX" = "true" ] || [ "$IBEX" = "false" ]; then
            if [ -z "$PARAMS" ]; then PARAMS="?ibex=${IBEX}"; else PARAMS="${PARAMS}&ibex=${IBEX}"; fi
          fi
          echo "Llamando: ${BASE}${PARAMS}"
          curl -s --max-time 30 "${BASE}${PARAMS}"

      - name: Crear mercados trending
        continue-on-error: true
        run: |
          curl -s --max-time 30 \
            "${{ secrets.SITE_URL }}/api/create-markets?mode=trending&key=${{ secrets.ADMIN_API_KEY }}"
